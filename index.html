<!DOCTYPE html>
<html>
<head>
    <title>Popup Chaos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- POPUPS -->
    <img id="popup" class="popup" src="popup.png" width="300">
    <img id="popup2" class="popup" src="popup2.png" width="300">
    <img id="popup3" class="popup" src="popup3.png" width="300">
    <img id="popup4" class="popup" src="popup4.png" width="300">

    <!-- CLOSE BUTTON -->
    <img id="closeBtn" class="close" src="close.png" width="40" onclick="closePopup(event)">

    <script>
        let popupIndex = 0;

        const popups = [
            document.getElementById("popup"),
            document.getElementById("popup2"),
            document.getElementById("popup3"),
            document.getElementById("popup4")
        ];

        const closeBtn = document.getElementById("closeBtn");

        document.body.addEventListener("click", function() {

            const popup = popups[popupIndex];

            popup.style.display = "block";

            // RANDOM POSITIONS
            const randomX = Math.random() * (window.innerWidth - 320);
            const randomY = Math.random() * (window.innerHeight - 320);

            popup.style.left = randomX + "px";
            popup.style.top = randomY + "px";

            closeBtn.style.display = "block";

            popupIndex++;
            if (popupIndex >= popups.length) {
                popupIndex = 0;
            }
        });

        function closePopup(event) {
            event.stopPropagation();
            popups.forEach(p => p.style.display = "none");
            closeBtn.style.display = "none";
        }
    </script>

</body>
</html>
